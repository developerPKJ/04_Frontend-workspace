<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시각적인 효과 메소드 2</title>
    <!-- 온라인 방식 -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    
    <!--
        * CSS 의 opacity 속성

        - 요소의 투명도 관련 속성 (0 ~ 1)
        - 0 에 가까워질수록 더 투명해짐
    -->

    <div style="width : 100px; height : 100px; background-color : red; opacity : 0.35;"></div>

    <h3>* fadeIn() 과 fadeOut(), fadeToggle()</h3>

    <p>
        - 선택된 요소가 점점 투명해지면서 사라지고, 점점 선명해지면서 보여지게 해주는 메소드
    </p>

    <br><br>

    <button id="fadeOut">숨기기</button>
    <button id="fadeIn">보여주기</button>
    <button id="fadeToggle">토글</button>

    <br><br>

    <img id="kuromi" src="resources/image/kuromi.png">

    <script>
        $(document).ready(function() {

            $("#fadeOut").click(function() {

                $("#kuromi").fadeOut(3000);
            });

            $("#fadeIn").click(function() {

                $("#kuromi").fadeIn(3000);
            });

            $("#fadeToggle").click(function() {

                $("#kuromi").fadeToggle(3000);
            });
            
            // > 마찬가지로 밀리세컨초를 지정해서 서서히 효과를 줌!!
            // > 마찬가지로 이미지 뿐만 아니라 다른 요소들에게도 적용 가능함!!

        });
    </script>

    <!--
        * fadeIn(), fadeOut(), fadeToggle() 의 동작원리

        - 인라인 스타일 방식으로 서서히 opacity 값이 줄어들면서 사라졌다가
          서서히 opacity 값이 늘어나면서 선명하게 나타나는 원리임!!
        - 특히, 사라질 때에는 최종적으로 display : none; 으로 수렴하면서 숨김처리됨!!
    -->

</body>
</html>
