<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        div {
            background-color: beige;
            width: 350px;
            height: 35px;
            line-height: 35px;
            padding: 5px;
            border : 1px solid lightgray;
            border-radius: 10px;
        }

        p {
            border : 1px solid lightgray;
            width: 350px;
            height: 100px;
            padding: 5px;
            margin-top: 5px;
            margin-left: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 
        slideDown() 과 slideUp()
        - 요소가 서서히 아래로 내려오며 나타나거나 위로 올라가며 사라지는 효과를 적용하는 메소드
        
        (쇼핑몰 FAQ 페이지에서 자주 사용되는 효과)
    -->

    <!-- 질문은 div 답변은 p에 -->
    <div>Q. 반품 언제되나요?</div>
    <p>A. 반품은 상품 수령 후 7일 이내에 가능합니다.</p>

    <div>Q. 배송중인 상품 위치를 알고 싶습니다.</div>
    <p>A. 배송중인 상품의 위치는 주문 내역에서 확인할 수 있습니다.</p>

    <div>Q. 제품에 대한 문의는 어디로 해야 하나요?</div>
    <p>A. 카톡 플러스 친구 추가 후 문의 가능합니다.</p>

    <div>Q. 반품은 어떻게 하나요?</div>
    <p>A. 반품은 고객센터로 연락하시면 안내해드립니다.</p>

    <script>
        jQuery(document).ready(function() {
            // div 요소 클릭 시 해당 div 요소의 
            //  다음 형제 요소인 p 요소를 슬라이드 다운 효과로 보여줌
            // div 요소 클릭 시 p 요소가 보이는 상태면 해당 div 요소의
            //  다음 형제 요소인 p 요소를 슬라이드 업 효과로 숨김
            $("div").click(function() {
                if ($(this).next("p").is(":visible")) {
                    $(this).next("p").slideUp(500);
                } else {
                    $(this).next("p").slideDown(500);
                }
            });

            // jQuery 변수 명명 규칙 : 변수 이름 앞에 $를 붙이는 것을 권장
        });
    </script>
</body>
</html>
