<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시각적인 효과 메소드1</title>
    <!-- 온라인 방식 -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <h1>시각적인 효과 메소드 (Effect 메소드)</h1>
    
    <p>
        - 페이지 내에 애니메이션 효과를 만들기 위해 사용되는 메소드 집합
    </p>

    <h3>* show() 와 hide(), toggle()</h3>

    <button id="hide">숨기기</button>
    <button id="show">보여주기</button>
    <button id="toggle">토글</button>

    <br><br>

    <img id="bono" src="resources/image/bono.jpg">

    <br><br>

    <!-- 꼭 이미지가 아니더라도 효과 부여 가능!! -->
    <div id="area"
         style="width : 100px; height : 100px; background-color : red;"></div>

    <script>
        $(function() {

            $("#hide").click(function() {

                // $("#bono").hide(); 
                $("#bono").hide(3000);

                $("#area").hide(1000);
            });

            $("#show").click(function() {

                // $("#bono").show();
                $("#bono").show(3000);

                $("#area").show(1000);
            });

            $("#toggle").click(function() {

                // $("#bono").toggle();
                $("#bono").toggle(3000);

                $("#area").toggle(1000);
                // > toggle : 스위치 on / off 기능!!
                //            마찬가지로 밀리세컨초 단위로 시간 지정 가능

            });

            // > 그냥 호출하면 깜빡 거리면서 사라졌다가 나타나는 효과
            //   인자값으로 밀리세컨초 단위를 지정하면
            //   해당 시간에 걸쳐서 서서히 작아지면서 사라졌다가
            //   서서히 커지면서 나타나는 효과

        });
    </script>

    <!--
        * show(), hide(), toggle() 의 동작 원리

        - 인라인 스타일 방식으로 서서히 width, height 속성값을 키우거나 줄이면서
          애니메이션 효과를 부여한다.
        - 특히, 숨기기의 경우에는 최종적으로 display : none; 으로 수렴하면서
          숨김처리가 되는 원리임!!
    -->

</body>
</html>
