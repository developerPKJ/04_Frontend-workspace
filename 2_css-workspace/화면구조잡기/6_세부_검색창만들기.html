<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색창 만들기</title>

    <style>
        /* 임시 */
        div {
            border: 1px solid red;
            box-sizing: border-box;
        }

        /* 임시 */
        #header_2 {
            width: 600px;
            height: 150px;
        }

        #header_2 {
            position: relative;
        }
        
        #search_form {
            width: 80%;
            height: 20%;
            display: flex;
            position: absolute;
                /* 상대경로 설정 */
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            /* 가운데 정렬 */
        }

        #search_form > div {
            height: 100%;
            display: flex;
            align-items: center;
        }

        #search_text {
            width: 80%;
        }

        #search_btn {
            width: 20%;
        }

        #search_form > div > input {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="header_2">
        <form action="search" method="get" id="search_form">
            <div id="search_text">
                <input type="text" id="search">
            </div>
            <div id="search_btn">
                <input type="button" id="submit" value="검색">
            </div>
        </form>
    </div>
</body>
</html>
