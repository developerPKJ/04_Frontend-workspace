<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메뉴바 만들기</title>

    <style>
        /* 임시 */
        div {
            /* border: 1px solid red; */
            box-sizing: border-box;
        }

        /* 임시 */
        #navigator {
            width: 1000px;
            height: 40px;
        }

        #navi {
            /* border: 1px solid blue; */
            margin: 0;
            padding: 0;
                /* ul tag경우 margin, padding가 default로 설정되어 있음 */
            list-style-type: none;
                /* bullet 기호 제거 */
            width: 100%;
            height: 100%;
            box-sizing: border-box;
                /* 테두리도 default로 존재함 */
            display: flex;
        }

        #navi > li {
            /* border: 1px solid green; */
            width: 20%;
            height: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        #navi > li > ul {
            /* border: 1px solid orange; */
            margin: 0;
            padding: 0;
            list-style-type: none;
            box-sizing: border-box;
            display: none;
                /* 서브 메뉴 숨김 */
        }

        #navi > li:hover > ul {
            display: block;
                /* 서브 메뉴 보이게 */
        }

        /*
        아래와 같이도 가능
        #navi > li > a:hover + ul {
            display: block;
        }

        #navi > li > ul:hover {
            display: block;
        }
        */

        #navi a {
            /* border: 1px solid purple; */
            color: lightcoral;
            font-size: 13px;
            font-weight: 760;
            text-decoration: none;
                /* 밑줄 제거 */
            display: block;
            width: 100%;
            height: 100%;
                /*
                    대부분의 인라인 요소들은 width, height 설정이 안먹힘
                    a tag도 인라인 요소이기 때문에 display: block; 설정 필요
                */
            /*vertical-align: middle; */
                /*
                    디스플레이로 인해 속성이 무시됩니다. 'display: block'에서 세로 맞춤을 사용할 수 없습니다.css(propertyIgnoredDueToDisplay)
                    Affects the vertical positioning of the inline boxes generated by an inline-level element inside a line box.
                    Baseline icon Widely available across major browsers (Baseline since 2015)
                    Syntax: baseline | sub | super | text-top | text-bottom | middle | top | bottom | <percentage> | <length>
                    MDN Reference

                    이 속성은 인라인에만 적용가능, block 요소에는 적용되지 않음
                */
            line-height: 35px;
            box-sizing: border-box;
            /* 보통은 해당 블럭의 height와 동일한 값 사용
            지금은 a요소는 %로 지정했기 때문에 절대적인 세로 길이를 모름 */
        }
    </style>
</head>
<body>
    <div id="navigator">
        <ul id="navi">
            <!-- (li>a)*5 -->
            <li><a href="">Java</a></li>
            <li><a href="">Oracle</a></li>
            <li>
                <a href="">Front-end</a>
                <ul>
                    <li><a href="">HTML</a></li>
                    <li><a href="">CSS</a></li>
                    <li><a href="">JavaScript</a></li>
                    <li><a href="">jQuery</a></li>
                </ul>
            </li>
            <li>
                <a href="">Server</a>
                <ul>
                    <li><a href="">JDBC</a></li>
                    <li><a href="">Servlet</a></li>
                    <li><a href="">JSP</a></li>
                    <li><a href="">Ajax</a></li>
                </ul>
            </li>
            <li>
                <a href="">Framework</a>
                <ul>
                    <li><a href="">MyBatis</a></li>
                    <li><a href="">Spring</a></li>
                </ul>
            </li>
        </ul>
    </div>
</body>
</html>
