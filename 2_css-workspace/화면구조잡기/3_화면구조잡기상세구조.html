<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3_화면구조잡기상세구조</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        div {
            border: 1px solid red;
        }

        .wrap {
            width: 1000px;
            height: 800px;
            margin: 0 auto;
        }

        .wrap > div {
            width: 100%;
        }

        #header {
            height: 20%;
            display: flex;
        }

        #navigator {
            height: 5%;
        }

        #content {
            height: 55%;
            display: flex;
        }

        #footer {
            height: 20%;
        }

        #header > div,
        #content > div {
            height: 100%;
        }

        #header_1 {
            width: 20%;
        }

        #header_2 {
            width: 65%;
        }

        #header_3 {
            width: 15%;
        }

        #content_1 {
            width: 15%;
        }

        #content_2 {
            width: 60%;
        }

        #content_3 {
            width: 25%;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="header">
            <div id="header_1"></div>
            <div id="header_2"></div>
            <div id="header_3"></div>
        </div>
        <div id="navigator"></div>
        <div id="content">
            <div id="content_1"></div>
            <div id="content_2"></div>
            <div id="content_3"></div>
        </div>
        <div id="footer"></div>
    </div>
</body>
</html>
