<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세부_로그인폼만들기</title>

    <style>
        /* 임시 */
        div {
            box-sizing: border-box;
        }

        /* 임시 */
        #content_3 {
            width: 300px;
            height: 600px;
        }

        #login_form {
            width: 100%;
            height: 30%;
        }

        #login_form > * {
            width: 100%;
            box-sizing: border-box;
        }
        
        #login_form_input {
            height: 80%;
            display: flex;
        }

        #login_form_etc {
            height: 20%;
            text-align: center;
        }
        
        #login_input_form > * {
            height: 100%;
        }

        #login_input_id_pwd {
            width: 65%;
        }

        #login_input_btn {
            width: 35%;
        }

        #login_input_id_pwd > input {
            width: 100%;
            height: 50%;
            box-sizing: border-box;
        }

        #login_input_btn > input {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        #login_form_etc > a {
            text-decoration: none;
            color: black;
            font-size: 12px;
            margin: 10px;
            font-weight: 570;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div id="content_3">
        <div id="login_form">
            <form id="login_form_input" action="member/login" method="post">
                <div id="login_input_id_pwd">
                    <input type="text" name="userId" placeholder="아이디" required><br>
                    <input type="password" name="userPwd" placeholder="비밀번호" required>
                </div>
                <div id="login_input_btn">
                    <input type="submit" value="로그인">
                </div>
            </form>
            <div id="login_form_etc">
                <a href="">회원가입</a> |
                <a href="">ID/PWD 찾기</a>
            </div>
        </div>
    </div>
</body>
</html>
