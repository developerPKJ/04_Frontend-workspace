<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>레이아웃 관련 스타일2</title>

        <style>
            .outer {
                /*border : 1px solid blue;*/
                position: relative;
                /* 
                기준이 되는 부모요소에 position:relative로 기준점 선언
                기준점을 바로바로 지정해두지 않으면
                body태그로 자동으로 잡혀서 귀찮음
                 */
            }

            .positioning {
                border : 1px solid black;
            }

            #first {
                width : 300px;
                height : 300px;
                background-color: yellow;
            }

            #second {
                width : 200px;
                height : 200px;
                background-color: yellowgreen;
                position: absolute;
                /* 이동할 자식요소를 부모 요소 기준으로 옮길수 있도록*/
                top: 50px;
                left: 50px;
            }

            #third {
                width : 100px;
                height : 100px;
                background-color: red;
                position: absolute;
                top: 100px;
                left: 100px;
                /*부모요소 기준점으로 부터 얼만큼 떨어진 위치로 옮길지*/
            }

            .fixed-area {
                width: 100px;
                height: 100px;
                background-color: red;
                /*position: fixed;*/
            }

            .z-test {
                width : 150px;
                height : 150px;
                border : 1px solid black;
                position: absolute;
            }

            #z1 {
                top: 0px;
                left: 0px;
                z-index: 2;
                background-color: yellow;
            }

            #z2 {
                top: 25px;
                left: 25px;
                z-index: 0;
                background-color: green;

            }

            #z3 {
                top: 50px;
                left: 50px;
                z-index: 1;
                /* 숫자가 클수록 위에 쌓임 */
                background-color: blue;
            }

            .vis-test {
                width: 100px;
                height: 100px;
                border: 1px solid black;
            }

            #vis {
                /*visibility: hidden;*/
                /* 요소는 존재하지만 보이지 않음
                하지만 공간은 계속 차지하고 있음 */

                display: none;
                /* 요소를 화면에서 완전히 제거하고 공간도 차지하지 않음 */
            }

            .float-test {
                width: 100px;
                height: 100px;
                border: 1px solid black;
                float: right;
                /* 요소를 오른쪽으로 띄워서 배치 */
            }
        </style>
    </head>

    <body>
        <h1>배치관련 스타일</h1>
        <h3>position : 절대위치 상대위치</h3>

        <div class="outer">
            <div id="first" class="positioning">1번</div>
            <div id="second" class="positioning">2번</div>
            <div id="third" class="positioning">3번</div>
        </div>

        <!--
        emmet문법 사용 방식(*)
        : div[id=].class * n
        div#id.class * n
        div.class#id * n

        br*40
        -->

        <br><br>

        <h3>position : fixed</h3>

        <div class="positioning fixed-area">고정영역</div>
        <!-- 주로 메뉴바를 상단에 고정할 때 사용
         화면의 특정 위치에 고정됨
         배경이미지 속성중 background-attachment: fixed;와 유사한 효과-->

        <br><br>

        <h3>z-index</h3>

        <p>
            페이지 안에 요소들을 순서대로 위로 쌓을 때,
            그 순서를 지정해줄 수 있는 속성
            (position이 relative, absolute, fixed인 요소에만 적용됨)
        </p>

        <div class="outer">
            <!-- div#z$.z-test{요소$}*3 -->
            <div id="z1" class="z-test">요소1</div>
            <div id="z2" class="z-test">요소2</div>
            <div id="z3" class="z-test">요소3</div>
        </div>

        <br><br><br><br><br><br><br><br><br><br><br><br>

        <!-- position요소를 적용하면 body에 붙는게 아닌 공중에 뜬 상태로
         배치됨 : 다음 요소를 작성하면 공중에 뜬 요소 아래에 가려지게 됨-->

        <h3>visibility</h3>

        <p>
            요소의 가시성을 제어하는 속성
        </p>

        <!-- div.vis-test[style=]*3 -->
        <div class="vis-test" style="background-color: red;"></div>
        <div id="vis" class="vis-test" style="background-color: green;"></div>
        <div class="vis-test" style="background-color: yellow;"></div>
         
        <br><br>

        <h3>float</h3>

        <p>
            페이지 내의 요소들을 화면에서 띄워서 왼쪽/오른쪽으로 배치
        </p>

        <!-- div.float-test{요소$}*5 -->
        <div class="float-test">요소1</div>
        <div class="float-test">요소2</div>
        <div class="float-test">요소3</div>
        <div class="float-test">요소4</div>
        <div class="float-test">요소5</div>

        <br clear="both">
        <!-- float으로 띄워진 요소들 아래에 새로운 요소를 작성할 때,
         띄워진 요소들 사이에 끼어들어서 배치되는 것을 방지하기 위해
         띄워진 요소들의 아래쪽에 빈 줄을 만들어주는 태그 -->
        
        <hr>
        
    </body>
</html>
