<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button href="http://www.naver.com">네이버로 이동</button>
    <!-- href 속성은 a태그에만 적용가능한 속성임,
     일반적으로 다른 태그에는 사용 불가 -->
    
    <br><br>

    <a href="www.naver.com">네이버로 이동</a>
    <!-- a태그는 애초에 클릭 시 요청할 url 주소를 작성할 수 있는
     href 속성을 제공해주고 있음
     
     동작원리 : href 속성에 담긴 url 주소를 클릭 시 요청함 -->

    <button onclick="window.location.href='http://www.naver.com'">네이버로 이동</button>
    <!-- window 객체는 브라우저 창 자체를 의미하는 객체로써,
     location 객체는 현재 페이지의 주소와 관련된 정보를 담고 있는 객체임
     href 속성은 location 객체의 속성으로써, 현재 페이지의 주소를 나타냄
     onclick 이벤트 핸들러에 window.location.href='http://www.naver.com' 코드를 작성하여
     버튼 클릭 시 window 객체의 location 객체의 href 속성에 'http://www.naver.com' 값을 할당함
     이로 인해 브라우저는 네이버로 이동하게 됨 -->

    <br><br>

    <!-- location 객체에서 제공하는 다른 유용한메소드 속성들
     assign, reload, replace -->

    <button onclick="location.assign('http://www.google.com');">구글로 이동</button>

    <br><br>

    <button onclick="location.replace('http://www.google.com');">구글로 이동 (replace)</button>
    <!-- assign과 replace의 차이점
     assign은 현재 페이지에서 새 페이지로 이동할 때, 이전 페이지로 돌아갈 수 있는 반면,
     replace는 현재 페이지에서 새 페이지로 이동할 때, 이전 페이지로 돌아갈 수 없음
     즉, assign은 브라우저의 히스토리에 새 페이지를 추가하지만, replace는 현재 페이지를 새 페이지로 대체함 -->

    <br><br>

    <button onclick="console.log(navigator)"></button>

</body>
</html>
