<!-- html 주석 -->
 <!DOCTYPE html>
 <!-- 
    HTML 문서 형식을 선언하는 부분
    - HTML5 표준 형식임을 알려줌
-->

<html lang="ko">
    <!--
        html 태그
        - html 문서의 시작과 끝을 나타내는 태그
        - lang 속성은 이 문서가 어느 나라 언어로 되어있는지 표시해줌(생략 가능)
    -->
    <head>
        <!-- head 태그
            - 문서의 머리부(header)를 나타냄
            - 정보, 제목, 설명, 스타일 시트의 링크, 스크립트 코드 등을 정의

            <title>, <meta>, <link>, <style>, <script>
        -->
        <title>글자 관련 태그</title>
        <!-- 문서의 제목을 나타냄 -->


        <meta charset="UTF-8">
        <!-- 문자 인코딩을 UTF-8로 설정 -->

        <meta name = "generator" content="VSCode">
        <!-- 문서를 생성한 프로그램 -->

        <meta name = "author" content="김영희">
        <!-- 문서의 저자 -->

        <meta name = "keywords" content="헤더, 글자, 태그">
        <!-- 문서의 핵심 키워드 -->

        <meta name = "description" content="글자 관련 태그에 대한 설명">
        <!-- 문서에 대한 설명 -->
        <!-- meta :  주석 역할, 문서에 대한 정보를 적어줄 수 있는 태그(화면에 안보임)-->
    </head>

    <body>
        <!-- 
            body 태그
            - 이 문서의 몸통부를 나타냄
            - 브라우저 화면에서 출력해서 보여주는 모든 정보, 내용들을 작성하는 부분
        -->
        안녕하세요
        <!-- 태그 없어도 내용이 출력됨 -->

        반갑습니다
        <!-- 
            안에 코드 작성 위치와 상관 없이 내용이 출력됨 
            즉, enter space 같은 공백은 무시됨
        -->
        
        <br>
        <!-- 줄바꿈 태그 -->
         안녕히가세요

         <br>
         <br>

         <!--
            제목을 달 수 있는 태그
            h1 ~ h6까지 존재
         -->
        <h1>제목1</h1>
        <h2>제목2</h2>
        <h3>제목3</h3>
        <h4>제목4</h4>
        <h5>제목5</h5>
        <h6>제목6</h6>

        <br>

        <!-- 글자 강조 -->
        <strong>strong : 글자 강조</strong>
        <br>
        <b>b : 글자 강조</b>
        <br>
        <br>
        <!--글자 형광펜 표시-->
        <mark>mark : 글자 형광펜 표시</mark>
        <br>
        <br>
        <!-- 글자 취소선 표시 -->
        <s>s : 글자 취소선 표시</s>
        <br>
        <del>del : 글자 취소선 표시</del>
        <br>
        <strike>strike : 글자 취소선 표시</strike>
        <!-- strike는 HTML5 표준 태그가 아님(사용 비권장)-->
        <br>
        <br>
        <!--글자 밑줄 표시-->
        <u>u : 글자 밑줄 표시</u>
        <br>
        <br>
        <!-- 글자 기울임 -->
        <i>i : 글자 기울임</i>
        <br>
        <em>em : 글자 기울임</em>
        <br>
        <br>
        <!-- 작은 글씨 -->
        <small>small : 작은 글씨</small>
        <br>
        <br>
        <!-- 첨자 -->
        <sub>sub : 아래첨자</sub>
        <br>
        <sup>sup : 위첨자</sup>
        <br>
        <br>
        <!-- 툴팁 -->
        <addr title="이메일 주소">contact : 이메일 주소</addr>
        <!-- 단어의 축약형이나 머리글자로만 된 단어를 정의할 때 쓸 수 있음,
         화면 상 마우스 포인터를 가져다 대면 title 속성값이 뜸-->
    </body>
        
</html>
